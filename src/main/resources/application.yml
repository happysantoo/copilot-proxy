spring:
  application:
    name: copiproxy
  threads:
    virtual:
      enabled: true
  datasource:
    url: jdbc:sqlite:${copiproxy.storage.sqlite-path}
    driver-class-name: org.sqlite.JDBC
  sql:
    init:
      mode: always

server:
  port: ${PORT:3000}

logging:
  level:
    root: ${LOG_LEVEL:INFO}

copiproxy:
  storage:
    # Path to the SQLite database file (relative or absolute).
    # Override via application config, or env: COPROXY_STORAGE_SQLITE_PATH or DATABASE_PATH (legacy).
    sqlite-path: ${COPROXY_STORAGE_SQLITE_PATH:${DATABASE_PATH:./copiproxy.db}}
  github:
    device-code-url: https://github.com/login/device/code
    oauth-url: https://github.com/login/oauth/access_token
    copilot-api-url: https://api.githubcopilot.com
    copilot-token-url: https://api.github.com/copilot_internal/v2/token
    client-id: Iv1.b507a08c87ecfe98
    # Model injected when the client omits "model" from the request body.
    default-model: ${COPIPROXY_DEFAULT_MODEL:claude-opus-4}
    # Headers sent to Copilot upstream. Override to match a different editor fingerprint.
    # editor-version: vscode/1.98.0
    # editor-plugin-version: copilot-chat/0.23.2
    # user-agent: GitHubCopilotChat/0.23.2
    # copilot-integration-id: vscode-chat
    # openai-organization: github-copilot
    # openai-intent: conversation-panel
    # github-api-version: 2025-01-21

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
