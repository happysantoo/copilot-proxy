spring.application.name=copiproxy
server.port=${PORT:3000}

# Java 21 virtual threads for request handling
spring.threads.virtual.enabled=true

spring.datasource.url=jdbc:sqlite:${DATABASE_PATH:./copiproxy.db}
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.sql.init.mode=always

logging.level.root=${LOG_LEVEL:INFO}

copiproxy.github.device-code-url=https://github.com/login/device/code
copiproxy.github.oauth-url=https://github.com/login/oauth/access_token
copiproxy.github.copilot-api-url=https://api.githubcopilot.com
copiproxy.github.copilot-token-url=https://api.github.com/copilot_internal/v2/token
copiproxy.github.client-id=Iv1.b507a08c87ecfe98

# Actuator endpoints
management.endpoints.web.exposure.include=health,info,metrics,prometheus

# OpenTelemetry tracing
management.tracing.sampling.probability=1.0
management.otlp.tracing.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT:http://localhost:4318/v1/traces}
